<!DOCTYPE html>
<html>
<head>
  <title>Nebula Blog</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Inter;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 40px;
      margin-bottom: 30px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #1e293b;
      color: white;
    }

    textarea {
      height: 120px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #3b82f6;
      color: white;
    }

    .danger {
      background: #ef4444;
      color: white;
      margin-left: 10px;
    }

    .edit {
      background: #f59e0b;
      color: white;
      margin-left: 10px;
    }

    .post {
      background: #1e293b;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
    }

    .auth {
      margin-bottom: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>🚀 Nebula Blog</h1>

  <!-- AUTH -->
  <div class="auth" id="authBox">

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="primary" onclick="signup()">Sign Up</button>
    <button class="primary" onclick="login()">Login</button>

  </div>

  <button class="danger hidden" id="logoutBtn" onclick="logout()">Logout</button>

  <!-- CREATE POST -->
  <div id="editor" class="hidden">

    <input id="title" placeholder="Post title">
    <textarea id="content" placeholder="Write your post..."></textarea>

    <button class="primary" onclick="addPost()">Publish Post</button>

  </div>

  <h2>Posts</h2>

  <div id="posts"></div>

</div>

<script>

const SUPABASE_URL = "https://ttzzikgwpidhqtfjhfpj.supabase.co";
const SUPABASE_KEY = "sb_publishable_JwYA0CpbpfZFXFm5wKwMdQ_zG28emLe";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let editingId = null;

checkUser();

async function checkUser() {

  const { data } = await supabase.auth.getUser();

  if (data.user) {

    user = data.user;

    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("editor").classList.remove("hidden");
    document.getElementById("logoutBtn").classList.remove("hidden");

    loadPosts();

  }

}

async function signup() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await supabase.auth.signUp({ email, password });

  alert("Signup success. Now login.");

}

async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await supabase.auth.signInWithPassword({ email, password });

  location.reload();

}

async function logout() {

  await supabase.auth.signOut();

  location.reload();

}

async function addPost() {

  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  if (editingId) {

    await supabase
      .from("posts")
      .update({ title, content })
      .eq("id", editingId);

    editingId = null;

  } else {

    await supabase
      .from("posts")
      .insert({
        title,
        content,
        user_id: user.id
      });

  }

  document.getElementById("title").value = "";
  document.getElementById("content").value = "";

  loadPosts();

}

async function loadPosts() {

  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("id", { ascending: false });

  const postsDiv = document.getElementById("posts");

  postsDiv.innerHTML = "";

  data.forEach(post => {

    postsDiv.innerHTML += `

      <div class="post">

        <h3>${post.title}</h3>

        <p>${post.content}</p>

        ${
          user && user.id === post.user_id
          ?
          `
          <button class="edit" onclick="editPost(${post.id}, '${post.title}', '${post.content}')">Edit</button>

          <button class="danger" onclick="deletePost(${post.id})">Delete</button>
          `
          :
          ""
        }

      </div>

    `;

  });

}

function editPost(id, title, content) {

  editingId = id;

  document.getElementById("title").value = title;
  document.getElementById("content").value = content;

}

async function deletePost(id) {

  await supabase
    .from("posts")
    .delete()
    .eq("id", id);

  loadPosts();

}

loadPosts();

</script>

</body>
</html>
