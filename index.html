<!DOCTYPE html>
<html>
<head>
  <title>Nebula Blog</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h1>Nebula Blog</h1>

<input id="title" placeholder="Enter title"><br><br>
<textarea id="content" placeholder="Enter content"></textarea><br><br>

<button onclick="addPost()">Add Post</button>

<h2>Posts</h2>
<div id="posts"></div>

<script>

const SUPABASE_URL = "https://ttzzikgwpidhqtfjhfpj.supabase.co";
const SUPABASE_KEY = "sb_publishable_JwYA0CpbpfZFXFm5wKwMdQ_zG28emLe";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function addPost() {

  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  await supabase.from("posts").insert([
    { title, content }
  ]);

  loadPosts();
}

async function loadPosts() {

  const { data } = await supabase.from("posts").select("*");

  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";

  data.forEach(post => {
    postsDiv.innerHTML += `
      <div>
        <h3>${post.title}</h3>
        <p>${post.content}</p>
        <hr>
      </div>
    `;
  });

}

loadPosts();

</script>

</body>
</html>
