<!DOCTYPE html>
<html>
<head>
  <title>Nebula Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 32px;
      background: linear-gradient(45deg, #00f5ff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: #1f1f2f;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #2c2c3f;
      color: white;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: linear-gradient(45deg, #00f5ff, #ff00ff);
      color: black;
      font-weight: bold;
    }

    .post {
      background: #26263b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      position: relative;
    }

    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      color: white;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      opacity: 0.6;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <h1>🌌 Nebula Blog</h1>

  <div class="container">

    <!-- AUTH CARD -->
    <div class="card" id="authCard">
      <h3>Login / Signup</h3>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button onclick="signup()">Signup</button>
      <button onclick="login()">Login</button>
    </div>

    <!-- CREATE POST -->
    <div class="card hidden" id="postCard">
      <h3>Create Post</h3>
      <input type="text" id="title" placeholder="Post Title">
      <textarea id="content" rows="4" placeholder="Write something..."></textarea>
      <button onclick="createPost()">Publish</button>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- POSTS -->
    <div id="posts"></div>

  </div>

  <div class="footer">
    Built by Abhijit Yuvaraj Ghatage 🚀
  </div>

  <!-- FIREBASE -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
      from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp } 
      from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBoAXP8gwJ-V5dIpWmP2t6K2UU63aBswcE",
      authDomain: "nebula-blog-ff927.firebaseapp.com",
      projectId: "nebula-blog-ff927",
      storageBucket: "nebula-blog-ff927.firebasestorage.app",
      messagingSenderId: "799015372993",
      appId: "1:799015372993:web:2a91c585153ca906732c40"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authCard = document.getElementById("authCard");
    const postCard = document.getElementById("postCard");
    const postsDiv = document.getElementById("posts");

    window.signup = async function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      await createUserWithEmailAndPassword(auth, email, password);
    }

    window.login = async function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      await signInWithEmailAndPassword(auth, email, password);
    }

    window.logout = async function() {
      await signOut(auth);
    }

    window.createPost = async function() {
      const title = document.getElementById("title").value;
      const content = document.getElementById("content").value;

      await addDoc(collection(db, "posts"), {
        title,
        content,
        userId: auth.currentUser.uid,
        createdAt: serverTimestamp()
      });

      document.getElementById("title").value = "";
      document.getElementById("content").value = "";
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        authCard.classList.add("hidden");
        postCard.classList.remove("hidden");
      } else {
        authCard.classList.remove("hidden");
        postCard.classList.add("hidden");
      }
    });

    onSnapshot(collection(db, "posts"), (snapshot) => {
      postsDiv.innerHTML = "";
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const postElement = document.createElement("div");
        postElement.className = "post";
        postElement.innerHTML = `
          <h3>${data.title}</h3>
          <p>${data.content}</p>
        `;

        if (auth.currentUser && auth.currentUser.uid === data.userId) {
          const delBtn = document.createElement("div");
          delBtn.className = "delete-btn";
          delBtn.innerText = "Delete";
          delBtn.onclick = async () => {
            await deleteDoc(doc(db, "posts", docSnap.id));
          };
          postElement.appendChild(delBtn);
        }

        postsDiv.appendChild(postElement);
      });
    });

  </script>

</body>
</html>
