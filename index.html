<!DOCTYPE html>
<html>
<head>

<title>Nebula Blog</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:
radial-gradient(circle at top,#1f1f3a,#0c0c17);

color:white;

padding:40px;

min-height:100vh;

}

/* HEADER */

.header{

display:flex;
justify-content:center;
margin-bottom:40px;

}

.logo{

font-size:42px;
font-weight:600;

background:
linear-gradient(90deg,#6ea8ff,#9d6eff,#00f7ff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* CARD */

.card{

background:rgba(255,255,255,0.06);

backdrop-filter:blur(12px);

padding:25px;

border-radius:16px;

margin-bottom:30px;

box-shadow:
0 0 25px rgba(0,0,0,0.3),
0 0 30px rgba(0,200,255,0.15);

}

/* INPUT */

input,textarea{

width:100%;

padding:14px;

border-radius:10px;

border:none;

margin-top:10px;

margin-bottom:15px;

background:rgba(255,255,255,0.08);

color:white;

}

textarea{

height:120px;

}

/* BUTTON */

button{

padding:10px 18px;

border-radius:10px;

border:none;

cursor:pointer;

margin-right:10px;

font-weight:600;

background:linear-gradient(45deg,#5b8cff,#8b5cff);

color:white;

transition:0.25s;

}

button:hover{

transform:scale(1.05);

}

/* POSTS */

.post{

background:rgba(255,255,255,0.07);

border-radius:14px;

padding:20px;

margin-bottom:20px;

transition:0.3s;

}

.post:hover{

transform:translateY(-5px);

box-shadow:0 0 25px rgba(0,200,255,0.3);

}

.post-title{

font-size:20px;
font-weight:600;

margin-bottom:5px;

}

.post-meta{

font-size:12px;
opacity:0.6;

margin-bottom:10px;

}

.post-content{

line-height:1.6;

margin-bottom:10px;

}

/* LIKE BUTTON */

.like{

cursor:pointer;

margin-right:10px;

}

/* COMMENT */

.comment-box{

margin-top:10px;

}

.comment{

font-size:13px;

opacity:0.8;

margin-top:5px;

}

/* DELETE */

.delete{

background:#ff3b3b;

margin-top:10px;

}

/* HIDDEN */

.hidden{

display:none;

}

.footer{

text-align:center;

margin-top:50px;

opacity:0.5;

}

</style>

</head>

<body>


<div class="header">

<div class="logo">🚀 Nebula Blog</div>

</div>


<!-- LOGIN CARD -->

<div id="authCard" class="card">

<h3>Login / Signup</h3>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<button onclick="login()">Login</button>

</div>


<!-- CREATE POST -->

<div id="postCard" class="card hidden">

<h3>Create Post</h3>

<input id="title" placeholder="Post title">

<textarea id="content" placeholder="Write something..."></textarea>

<button onclick="publish()">Publish</button>

<button onclick="logout()">Logout</button>

</div>


<!-- POSTS -->

<div id="posts"></div>


<div class="footer">

Built by Abhijit Yuvaraj Ghatage 🚀

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
updateDoc,
arrayUnion,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_PROJECT.firebaseapp.com",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_PROJECT.appspot.com",

messagingSenderId: "YOUR_SENDER_ID",

appId: "YOUR_APP_ID"

};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);



const authCard = document.getElementById("authCard");

const postCard = document.getElementById("postCard");

const postsDiv = document.getElementById("posts");
  // SIGNUP

window.signup = async function(){

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

if(!email || !password){

alert("Enter email and password");

return;

}

try{

await createUserWithEmailAndPassword(auth,email,password);

alert("Account created successfully");

}catch(err){

alert(err.message);

}

};


// LOGIN

window.login = async function(){

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

if(!email || !password){

alert("Enter email and password");

return;

}

try{

await signInWithEmailAndPassword(auth,email,password);

}catch(err){

alert(err.message);

}

};


// LOGOUT

window.logout = async function(){

await signOut(auth);

};


// AUTH STATE LISTENER

onAuthStateChanged(auth,(user)=>{

if(user){

authCard.classList.add("hidden");

postCard.classList.remove("hidden");

}else{

authCard.classList.remove("hidden");

postCard.classList.add("hidden");

}

});
  // PUBLISH POST

window.publish = async function(){

const title = document.getElementById("title").value.trim();

const content = document.getElementById("content").value.trim();

if(!title || !content){

alert("Post cannot be empty");

return;

}

try{

await addDoc(collection(db,"posts"),{

title:title,
content:content,
userId:auth.currentUser.uid,
email:auth.currentUser.email,
likes:0,
likedBy:[],
comments:[],
createdAt:serverTimestamp()

});

document.getElementById("title").value="";
document.getElementById("content").value="";

}catch(err){

alert(err.message);

}

};
  // REALTIME POSTS LISTENER

onSnapshot(collection(db,"posts"),(snapshot)=>{

postsDiv.innerHTML="";

let postsArray=[];

snapshot.forEach((docSnap)=>{

postsArray.push({ id: docSnap.id, ...docSnap.data() });

});

// SORT BY NEWEST

postsArray.sort((a,b)=>{
if(!a.createdAt || !b.createdAt) return 0;
return b.createdAt.seconds - a.createdAt.seconds;
});

postsArray.forEach((data)=>{

const post = document.createElement("div");

post.className="post";

const date = data.createdAt && data.createdAt.seconds
? new Date(data.createdAt.seconds * 1000).toLocaleString()
: "Just now";

post.innerHTML = `
<div class="post-title">${data.title}</div>

<div class="post-meta">
By ${data.email || "Unknown"} • ${date}
</div>

<div class="post-content">
${data.content}
</div>

<div>
<span class="like">❤️ ${data.likes || 0}</span>
</div>

<div class="comment-box">
<input type="text" placeholder="Add comment..." id="comment-${data.id}">
<button onclick="addComment('${data.id}')">Comment</button>
</div>

<div id="comments-${data.id}"></div>
`;


// SHOW COMMENTS

if(data.comments && data.comments.length > 0){

data.comments.forEach((c)=>{

const commentDiv = document.createElement("div");

commentDiv.className="comment";

commentDiv.innerText = c;

post.querySelector(`#comments-${data.id}`).appendChild(commentDiv);

});

}


// LIKE BUTTON

post.querySelector(".like").onclick = async ()=>{

if(!auth.currentUser) return alert("Login first");

if(data.likedBy && data.likedBy.includes(auth.currentUser.uid)){
alert("You already liked this");
return;
}

await updateDoc(doc(db,"posts",data.id),{
likes:(data.likes || 0)+1,
likedBy:arrayUnion(auth.currentUser.uid)
});

};


// DELETE BUTTON (ONLY OWNER)

if(auth.currentUser && auth.currentUser.uid === data.userId){

const del = document.createElement("button");

del.className="delete";

del.innerText="Delete";

del.onclick = async ()=>{

await deleteDoc(doc(db,"posts",data.id));

};

post.appendChild(del);

}

postsDiv.appendChild(post);

});

});
  </script>
</body>
</html>
